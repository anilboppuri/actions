name: MultiJob-AngApp

on:
  push:
    branches: [master]

jobs:
  deploy-angular:
       runs-on : ubuntu-latest
      steps: 
        name: Test
        run : echo "tests running"
        
  build-angular:
    runs-on: ubuntu-latest
    steps:
     - uses : actions/checkout@v4

     - name: Setup NodeJS
       uses: actions/setup-node@v4
       with:
         node-version: 18.x
     - name: Install dependencies
       run: npm install 

     - name: Build
       run: npm run build 
       
  
